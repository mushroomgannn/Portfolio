<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamis — Peterbos</title>
  <link rel="stylesheet" href="../0_homepage.css">
</head>

<body>
  <main id="main-content">

  <!-- ZONES DE CLIC -->
  <div id="click-left"  onclick="prevSlide()"></div>
  <div id="click-right" onclick="nextSlide()"></div>

  <!-- VISIONNEUSE -->
  <div id="project-viewer">
    <img id="project-img" src="" alt="">
    <div id="img-caption"></div>
    <div id="progress"></div>
  </div>

  <div id="projet-info">

    <!-- Description liée à l'image — change dynamiquement -->
    <div id="img-description"></div>

    <div class="info-divider"></div>

    <!-- Infos générales — fixes -->
    <div id="projet-general">
      <h2>Tamis</h2>
      <h3>Maison senior, habiter le quotidien en des gestes lents</h3>

      <h4>Peterbos, Anderlecht, Bruxelles · Automne 2025</h4>
      <h4>P7/9 Modernités parallèles — ENSA Paris-Malaquais</h4>
      <h4>Maison senior</h4>
      <h4>Supervisé par Édouard Ropars et Yves Bélorgey</h4>
    </div>

  </div>

  </main>

</body>

<script src="../shared/common.js" defer></script>

<script>
// ── DONNÉES : images + légende + description ──
const slides = [
  {
    img: 'img/bruxelles_01.jpg',
    caption: 'Vue d\'ensemble',
    description: 'Situé au cœur du quartier de Peterbos, le projet s\'inscrit dans un paysage marqué par de grandes tours d\'habitation et de vastes espaces ouverts.'
  },
  {
    img: 'img/bruxelles_02.jpg',
    caption: 'Plan masse',
    description: 'Une masse initiale compacte est fragmentée et décalée afin d\'alléger la perception du bâti et de retrouver une échelle domestique.'
  },
  {
    img: 'img/bruxelles_03.jpg',
    caption: 'Coupe transversale',
    description: 'Les circulations sont déplacées à l\'extérieur du volume, créant des espaces intermédiaires généreux qui prolongent la vie intérieure vers l\'extérieur.'
  },
  {
    img: 'img/bruxelles_04.jpg',
    caption: 'Détail de façade',
    description: 'Par un jeu de gradins, de seuils et de transparences, Tamis organise une transition progressive entre intimité et collectif.'
  }
];

let current = 0;

const imgEl          = document.getElementById('project-img');
const captionEl      = document.getElementById('img-caption');
const progressEl     = document.getElementById('progress');
const descriptionEl  = document.getElementById('img-description');

function showSlide(index) {
  const slide = slides[index];
  imgEl.src          = slide.img;
  imgEl.alt          = slide.caption;
  captionEl.textContent     = slide.caption;
  descriptionEl.textContent = slide.description;
  progressEl.textContent    = `${index + 1} / ${slides.length}`;
}

function nextSlide() {
  current = (current + 1) % slides.length;
  showSlide(current);
}

function prevSlide() {
  current = (current - 1 + slides.length) % slides.length;
  showSlide(current);
}

// Navigation clavier
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextSlide();
  if (e.key === 'ArrowLeft')  prevSlide();
});

// Init
showSlide(0);
</script>
  


</body>
</html>
