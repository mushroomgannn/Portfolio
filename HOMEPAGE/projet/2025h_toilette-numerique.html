<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sh*t — Peterbos</title>
  <link rel="stylesheet" href="../0_homepage.css">
</head>

<body>
  <main>

    <!-- ZONES DE CLIC -->
    <div id="click-left"  onclick="prevSlide()"></div>
    <div id="click-right" onclick="nextSlide()"></div>

    <!-- VISIONNEUSE -->
    <div id="project-viewer">
      <div id="sequence-container"></div>
      <img id="project-img" src="" alt="">
      <div id="slide-meta">
        <div id="img-caption"></div>
        <div id="progress"></div>
      </div>
    </div>

    <div id="backdrop" class="backdrop-info"></div>
    <div class="panel" id="project-panel">
      <h4>2025		New York, États-Unis</br>
      Figuration et conceptualisation numérique </br>
      Supervisé par Samuel Bernier-Lavigne</br>
      Avec Fiona Audet, Cécilia Burlet et Delphine Daunais-Vachon</h4>
      <p>Le panel s'ouvre au-dessus du projet principal et permet de garder la vue sur le contenu flou en arrière-plan.</p>
      <button id="panel-close" type="button">x</button>
    </div>

    <!-- INFOS PROJET -->
    <div id="projet-info">

      <!-- Description liée à l'image — change dynamiquement -->
      <div id="img-description"></div>

      <div class="info-divider"></div>

      <!-- Infos générales — fixes -->
      <div id="projet-general">
        <button id="project-trigger" type="button">
          <h2>Sh*t</h2>
          <h3>Figuration et conceptualisation numérique d'une toilette publique</h3>
        </button>
      </div>

    </div>

  </main>

  <script src="../shared/common.js" defer></script>

  <script z-index="1">
    // ── DONNÉES : images + légende + description ──
    const slides = [
      {
        img: 'img_toilette/01.jpg',
        caption: '« Narcisse », Le Caravage, vers 1598, Huile sur toile 110 x 92 cm, Galerie nationale d\'art ancien, Rome. Italie',
        description: ''
      },
      {
        img: 'img_toilette/02.jpg',
        caption: 'Vue extérieure',
        description: ''
      },
      {
        img: 'img_toilette/03.png',
        caption: 'Site d\'implantation',
        description: '',
      },
      {
        img: 'img_toilette/04.jpg',
        caption: 'Axonométrie',
        description: '',
        width:'50%'
      },
      
      {
        img: 'img_toilette/05.jpg',
        caption: 'Axonométrie',
        description: '',
        width:'40%'
      },
      {
        img: 'img_toilette/06.jpg',
        caption: 'Axonométrie éclatée',
        description: '',
        
      },
      {
        img: 'img_toilette/07.jpg',
        caption: 'Vue intérieure',
        description: ''
      },
      
    ];

    let current = 0;

    const imgEl          = document.getElementById('project-img');
    const captionEl      = document.getElementById('img-caption');
    const progressEl     = document.getElementById('progress');
    const descriptionEl  = document.getElementById('img-description');
    const projectViewer  = document.getElementById('project-viewer');
    const projetGeneral  = document.getElementById('projet-general');
    const projectTrigger = document.getElementById('project-trigger');
    const projectPanel   = document.getElementById('project-panel');
    const backdropEl     = document.getElementById('backdrop');

    let sequenceTimer = null;
    let sequenceIndex = 0;

    function applyImageWidth(slide) {
      if (slide.width) {
        imgEl.style.width = slide.width;
      } else {
        imgEl.style.width = 'auto';
      }
    }

    function stopSequence() {
      if (sequenceTimer) {
        clearInterval(sequenceTimer);
        sequenceTimer = null;
      }
    }

    function startSequence(slide) {
      applyImageWidth(slide);

      if (!Array.isArray(slide.sequence) || slide.sequence.length === 0) {
        imgEl.src = slide.img;
        return;
      }

      sequenceIndex = 0;
      imgEl.src = slide.sequence[sequenceIndex];

      sequenceTimer = setInterval(() => {
        sequenceIndex = (sequenceIndex + 1) % slide.sequence.length;
        imgEl.src = slide.sequence[sequenceIndex];
      }, 1500);
    }

    function showSlide(index) {
      const slide = slides[index];
      stopSequence();

      imgEl.alt = slide.caption;
      captionEl.textContent     = slide.caption;
      descriptionEl.textContent = slide.description;
      progressEl.textContent    = `${index + 1} / ${slides.length}`;
      startSequence(slide);
    }

    function openProjectPanel() {
      projetGeneral.classList.add('open');
      projectViewer.classList.add('blurred');
      backdropEl.classList.add('visible', 'backdrop-info');
      projectPanel.classList.add('displayed');
    }

    function closeProjectPanel() {
      projetGeneral.classList.remove('open');
      projectViewer.classList.remove('blurred');
      backdropEl.classList.remove('visible', 'backdrop-info');
      projectPanel.classList.remove('displayed');
    }

    projectTrigger.addEventListener('click', event => {
      event.preventDefault();
      event.stopPropagation();
      openProjectPanel();
    });

    backdropEl.addEventListener('click', closeProjectPanel);
    document.getElementById('panel-close').addEventListener('click', closeProjectPanel);

    function nextSlide() {
      current = (current + 1) % slides.length;
      showSlide(current);
    }

    function prevSlide() {
      current = (current - 1 + slides.length) % slides.length;
      showSlide(current);
    }

    // Navigation clavier
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft')  prevSlide();
      if (e.key === 'Escape')   closeProjectPanel();
    });

    // Init
    showSlide(0);
  </script>

</body>
</html>
